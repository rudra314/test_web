<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .container {
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 5rem;
      color: #ffffff;
      text-shadow: 0 0 20px rgba(100, 200, 255, 0.8);
      letter-spacing: 4px;
      animation: pulse 2s infinite;
    }

    p {
      margin-top: 20px;
      font-size: 1.2rem;
      color: #a0c4ff;
      letter-spacing: 1px;
    }

    @keyframes pulse {
      0%, 100% { text-shadow: 0 0 20px rgba(100, 200, 255, 0.8); }
      50%       { text-shadow: 0 0 40px rgba(100, 200, 255, 1), 0 0 60px rgba(100, 200, 255, 0.5); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello, World!</h1>
    <p>My first web page — deployed and live!</p>
  </div>
</body>
</html>
